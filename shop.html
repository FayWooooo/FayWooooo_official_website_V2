<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>兌換中心 | FayWooooo 3.0</title>
    <link rel="icon" href="logo.ico">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</head>
<body>

    <div class="bg-glow"></div>

    <header class="topbar">
        <div class="logo"><i class="fa-solid fa-gift"></i> 商店</div>
        
        <nav class="navbar-center">
            <a href="index.html">首頁</a>
            <a href="shop.html" class="active">兌換</a>
            <a href="articles.html">文章</a>
        </nav>

        <div class="user-status-group">
            <div class="coin-pill">
                <i class="fa-solid fa-coins" style="color: #ffd700;"></i>
                <span id="coinDisplay">--</span>
            </div>
            <img id="navAvatar" src="" class="nav-avatar" style="display: none;">
        </div>
    </header>

    <main class="container">
        <div id="notification" class="notification"></div>
        <section class="card">
            <div class="section-title">
                <h2><i class="fa-solid fa-link"></i> 傳奇連鎖禮包</h2>
            </div>
            <div id="chainRewardList" class="chain-list">
                </div>
        </section>

        <h2 style="margin-bottom: 20px;"><i class="fa-solid fa-trophy"></i> 獎勵清單</h2>
        <div id="rewardList" class="shop-grid">
            </div>
    </main>

    <nav class="mobile-nav">
        <a href="index.html"><i class="fas fa-home"></i><br>首頁</a>
        <a href="shop.html" class="active"><i class="fas fa-store"></i><br>兌換</a>
        <a href="articles.html"><i class="fa-solid fa-book"></i><br>文章</a>
    </nav>

    <script type="module" src="js/shop.js"></script>

</html>
