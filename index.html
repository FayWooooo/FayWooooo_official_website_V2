<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FayWooooo 官方網站</title>
    <link rel="icon" href="logo.ico">
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
</head>
<body>

    <div class="bg-glow"></div>

    <header class="topbar">
        <div class="logo"><i class="fa-solid fa-star"></i> FayWooooo</div>
        <nav class="navbar-center">
            <a href="home.html" class="active">首頁</a>
            <a href="shop.html">兌換</a>
            <a href="articles.html">文章</a>
        </nav>
        
        <div id="userArea">
            <button id="loginBtn" class="main-btn">
                <i class="fa-brands fa-google"></i> 登入
            </button>
        </div>
    </header>

    <div id="profileMenu" class="glass-card profile-menu hidden">
        <div class="profile-header">
            <img id="userAvatar" src="https://i.imgur.com/4M34hi2.png" alt="Avatar">
            <div class="profile-text">
                <h3 id="userName">載入中...</h3>
                <p id="coinDisplay"><i class="fa-solid fa-coins"></i> Fay幣：<span id="userCoins">--</span></p>
            </div>
        </div>
        <hr class="divider">
        <div class="menu-actions">
            <button id="logoutBtn" class="menu-btn logout"><i class="fa-solid fa-right-from-bracket"></i> 登出帳號</button>
        </div>
    </div>

    <main class="container">
        <div class="hero">
            <h1 class="title">荒野亂鬥<br><span class="gradient-text">影音創作者</span></h1>
            <p class="subtitle">歡迎來到 FayWooooo 2026。登入後可完成任務、開寶箱、升級通行券！</p>
        </div>

        <div class="grid-layout">
            <section class="card">
                <h2><i class="fa-solid fa-star"></i> 官網功能</h2>
                <ul class="feature-list">
                    <li>蒐集Fay幣獲取獎勵</li>
                    <li>不定期抽獎Fay幣</li>
                    <li>不定期更新特色文章</li>
                </ul>
            </section>

            <section class="card">
                <h2><i class="fa-solid fa-chart-line"></i> 頻道數據</h2>
                <div class="stats">
                    <div class="stat-item"><span>訂閱者</span><strong>1,400+</strong></div>
                    <div class="stat-item"><span>總觀看</span><strong>700k+</strong></div>
                </div>
            </section>
        </div>

        <section id="newsSection" class="card">
            <h2><i class="fa-solid fa-bullhorn"></i> 最新公告</h2>
            <div id="newsList" class="news-list">暫無公告</div>
        </section>
    </main>

    <nav class="mobile-nav">
        <a href="/home" class="active"><i class="fas fa-home"></i><span>首頁</span></a>
        <a href="/shop"><i class="fa-solid fa-gift"></i><span>兌換</span></a>
        <a href="/articles"><i class="fa-solid fa-book"></i><span>文章</span></a>
    </nav>

    <script type="module" src="js/index.js"></script>
</body>
</html>
